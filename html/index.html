<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wolf Park Registration</title>
</head>

<body>

  <div class="auth">
    <div class="auth__card">

      <h2 class="auth__title">Create Account</h2>

      <form class="form">

        <div class="form__group">
          <label class="form__label">Username</label>
          <i class="form__icon fa-solid fa-user"></i>
          <input class="form__input" type="text" placeholder="Username" required>
        </div>

        <div class="form__group">
          <label class="form__label">Email</label>
          <i class="form__icon fa-solid fa-envelope"></i>
          <input class="form__input" type="email" placeholder="Email" required>
        </div>

        <div class="form__group">
          <label class="form__label">Password</label>
          <i class="form__icon fa-solid fa-lock"></i>
          <input class="form__input password" type="password" placeholder="Password" required>
          <i class="form__toggle fa-solid fa-eye-slash"></i>
        </div>

        <div class="form__group">
          <label class="form__label">Confirm Password</label>
          <i class="form__icon fa-solid fa-lock"></i>
          <input class="form__input password" type="password" placeholder="Confirm Password" required>
          <i class="form__toggle fa-solid fa-eye-slash"></i>
        </div>

        <button class="btn btn--primary" type="submit">Register</button>

        <div class="form__message"></div>

      </form>

      <p class="auth__footer">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

    </div>
  </div>
</body>
  <link rel="stylesheet" href="../css/style.css">
  <script type="text/javascript" src="../js/script.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</html>
